<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Radial glow behind the core -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle (for favicon/standalone context) -->
  <circle cx="256" cy="256" r="256" fill="#1E1B4B"/>

  <!-- Subtle glow field -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer emanation ring — full circle, thin -->
  <circle cx="256" cy="256" r="190" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.2" fill="none"/>

  <!-- Second ring -->
  <circle cx="256" cy="256" r="155" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>

  <!-- Arc fragment — upper right (signal breakout) -->
  <path d="M 370 130 A 160 160 0 0 1 410 220" stroke="#A5B4FC" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-linecap="round"/>

  <!-- Arc fragment — lower left -->
  <path d="M 100 340 A 170 170 0 0 1 140 400" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>

  <!-- Third ring — closer to core -->
  <circle cx="256" cy="256" r="115" stroke="#6366F1" stroke-width="2" stroke-opacity="0.35" fill="none"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="78" stroke="#6366F1" stroke-width="2" stroke-opacity="0.45" fill="none"/>

  <!-- Arc fragment — right side, inner -->
  <path d="M 320 190 A 85 85 0 0 1 340 256" stroke="#A5B4FC" stroke-width="2" stroke-opacity="0.5" fill="none" stroke-linecap="round"/>

  <!-- Core glow ring -->
  <circle cx="256" cy="256" r="40" stroke="#818CF8" stroke-width="2.5" stroke-opacity="0.5" fill="none"/>

  <!-- Nucleus — solid core -->
  <circle cx="256" cy="256" r="22" fill="#4F46E5"/>

  <!-- Bright center -->
  <circle cx="256" cy="256" r="10" fill="#818CF8"/>

  <!-- Highlight dot -->
  <circle cx="256" cy="256" r="4" fill="#C7D2FE"/>

  <!-- Amber accent dots — "worker voice" data points -->
  <circle cx="300" cy="210" r="3" fill="#FBBF24" opacity="0.6"/>
  <circle cx="195" cy="290" r="2.5" fill="#FBBF24" opacity="0.5"/>
  <circle cx="320" cy="310" r="2" fill="#FBBF24" opacity="0.4"/>
  <circle cx="230" cy="175" r="2" fill="#FBBF24" opacity="0.45"/>
</svg>
