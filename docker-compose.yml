services:
  mysql:
    image: mysql:8.0
    container_name: wovo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: iomadprod
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: wovo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d postgres"]
      interval: 10s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wovo_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: "SqlServer@123!"
      MSSQL_PID: Developer
      MSSQL_DATABASE: WOVO
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init/sqlserver/entrypoint.sh:/entrypoint.sh
      - ./init/sqlserver/01_schema.sql:/init/01_schema.sql
      - ./init/sqlserver/02_seed_data.sql:/init/02_seed_data.sql
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlServer@123!' -C -Q 'SELECT 1' -b"]
      interval: 15s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  postgres_data:
  sqlserver_data:
